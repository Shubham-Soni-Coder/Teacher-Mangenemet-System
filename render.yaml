services:
  - type: web
    name: teacherhub
    runtime: python
    region: singapore  # closest to India
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render will auto-generate a secure value
      - key: DATABASE_URL
        fromDatabase:
          name: teacherhub-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: teacherhub-db
    databaseName: teacherhub
    plan: free
    region: singapore
